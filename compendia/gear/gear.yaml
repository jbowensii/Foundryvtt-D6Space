name: Scholarchips
type: gear
system:
  description: |
      <p>Computer chips intended for use with both hand units and larger terminals. These contain available information on sectors, planets, some alien species, equipment, ships, personal data, business transactions, and so on. Use of a computer with a standard scholarchip in place allows the operator to roll as if he possessed a scholar or appropriate Knowledge-based skill in the subject detailed on the chip. Of course, the broader the range of information, and the more encrypted it is, the harder it is to get at what the character needs.  Cost: Very Easy for base die code of 1D, +1 to the price for each additional +1D.</p>
