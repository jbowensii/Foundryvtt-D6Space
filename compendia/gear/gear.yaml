name: Enviro-suit
type: gear
system:
  description: |
      <p>The basic environmental protection gear, the enviro-suit is designed for use in hostile climates or worlds whose atmosphere is unsafe. The enviro-suit features a helmet and full body suit (the helmet is detachable). Air is recycled by the mechanisms in the suit and bodily moisture is also filtered, to be stored in pouches inside the suit. Straws run up the suit and into the helmet to allow the user to take a drink.</p>

      <p>Enviro-suits commonly have comlink units built into the helmet and the belt. A small indicator light in the helmet flashes when in the presence of another comlink trained to the same frequency. An enviro-suit maintains a constant temperature around its wearer that can be adjusted via controls on the belt. A standard enviro-suit offers only a single layer of protection (Armor Value +1), which, if torn or pierced, renders the entire suit inoperative. More expensive suits offer two layers of protection, with a liquid sealant stored between the interior and the exterior. Damage done to the exterior layer can be sealed within one round (Armor Value +2). However, extensive damage rapidly exhausts the supply of sealant. (The average outfit comes with enough sealant to repair 20 small tears or 10 large ones.)</p>

      <p>Enviro-suits can hold enough air, food, and recycled water for several days to several weeks of use; about two weeks is standard. They can be refilled off of shipboard supplies (deducting the life support from the ship’s life support) or they can be refilled at stations and similar places for 10% of the base price of the suit. </p>
  price: M
  credits:
