name: Transform
type: skill
system:
  attribute: met
  description: |
      <p>This skill allows a character to alter temporarily people and things within the universe, including moving something from one location to another and changing a target’s natural capabilities. Some effects include: modifying a skill or attribute except general Perception uses, bargain, command, con, investigation, persuasion, search, Knowledge, or Knowledge-related skills; adding additional levels of a Special Ability the target already has; giving a target a new Special Ability, Disadvantage, or skill; placing new Limitations or Enhancements on an existing Special Ability; moving targets; and modifying a target’s Move value.</p>
   
      <p>To move a target, the skill total has to overcome the target’s weight value. (Look up the target’s mass on the “Lift Difficulties” table on page 91.) The target can resist by rolling her Strength or lift and adding it to her weight difficulty (theoretically, she tries to make herself harder for the manipulation to grasp; resisting does not count as an action for the target character). If the transform total is equal to or higher than the modified manipulation difficulty, the character is moved. This goes for self-teleportation as well (though the character is not likely to resist).</p>
  score: 0
