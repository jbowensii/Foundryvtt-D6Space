      <p>A character who has learned this skill can detect anything in existence, learn about her surroundings, and touch and influence minds. Some effects include: modifying Knowledge and general Perception attempts; modifying existing or including stand-alone bargain, command, con, investigation, persuasion, search, or Knowledge-related skills, especially to discern specific information.</p>
