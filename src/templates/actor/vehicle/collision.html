<form>
    <div class="flexrow flex-group-left vehiclespeed" data-type="vehiclespeed"
         data-speed="{{vehiclespeed}}">
        <label for="vehiclespeed">{{localize 'OD6S.VEHICLE_ATTACK_SPEED'}}</label>
        <select name="vehiclespeed" id="vehiclespeed" style="width: 70px;">
            {{#each (getVehicleSpeeds) as |vehiclespeed key|}}
                    <option value="{{key}}"
                            {{#if (eq key ../vehiclespeed)}}selected{{/if}}>
                        {{localize vehiclespeed.name}}
                    </option>
                {{/each}}
        </select>
    </div>
    <div class="flexrow flex-group-left vehiclecollisiontype" data-type="vehiclecollisiontype"
         data-speed="{{vehiclecollisiontype}}">
        <label for="vehiclecollisiontype">{{localize 'OD6S.VEHICLE_COLLISION_TYPE'}}</label>
        <select name="vehiclecollisiontype" id="vehiclecollisiontype" style="width: 70px;">
            {{#each (getCollisionTypes) as |vehiclecollisiontype key|}}
                    <option value="{{key}}"
                            {{#if (eq key ../vehiclecollisiontype)}}selected{{/if}}>
                        {{localize vehiclecollisiontype.name}}
                    </option>
                {{/each}}
        </select>
    </div>
    <div class="flexrow flex-group-left vehiclecollisionmod" data-type="vehiclecollisionmod">
        <label for="vehiclecollisionmod">{{localize 'OD6S.VEHICLE_COLLISION_MOD'}}</label>
        <div class="flexrow flex-group-center actionpenalty" data-actionpenalty="{{actionpenalty}}">
            <input type="number" onfocus="this.value=''" data-dtype="Number" data-mod="{{vehiclecollisionmod}}"
                   title="{{ localize 'OD6S.VEHICLE_COLLISION_MOD_HINT'}}"
                   max="99" id="vehiclecollisionmod" name="vehiclecollisionmod"
                   placeholder="{{vehiclecollisionmod}}"><b>D</b>
        </div>
    </div>
</form>
