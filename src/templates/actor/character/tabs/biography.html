<div class="tab biography" data-group="primary" data-tab="description">
    <div class="flexrow">
        <div class="grid grid-2col align-center">
            <label for="actor.system.gender.content" class="align-right">{{localize actor.system.gender.label}}:</label>
            <input title="{{localize actor.system.gender.label}}" name="system.gender.content" type="text"
                   value="{{actor.system.gender.content}}" placeholder="{{localize actor.system.gender.label}}"
                   data-dtype="{{actor.system.gender.type}}"/>
        </div>
        <div class="grid grid-2col align-center">
            <label for="actor.system.age.content" class="align-right">{{localize actor.system.age.label}}:</label>
            <input title="{{localize actor.system.age.label}}" name="system.age.content" type="text"
                   value="{{actor.system.age.content}}" placeholder="{{localize actor.system.age.label}}"
                   data-dtype="{{actor.system.gender.type}}"/>
        </div>
        <div class="grid grid-2col align-center">
            <label for="actor.system.height.content" class="align-right">{{localize actor.system.height.label}}:</label>
            <input title="{{localize actor.system.height.label}}" name="system.height.content" type="text"
                   value="{{actor.system.height.content}}" placeholder="{{localize actor.system.height.label}}"
                   data-dtype="{{actor.system.height.type}}"/>
        </div>
        <div class="grid grid-2col align-center">
            <label for="actor.system.weight.content" class="align-right">{{localize actor.system.weight.label}}:</label>
            <input title="{{localize actor.system.weight.label}}" name="system.weight.content" type="text"
                   value="{{actor.system.weight.content}}" placeholder="{{localize actor.system.weight.label}}"
                   data-dtype="{{actor.system.weight.label}}"/>
        </div>
    </div>
    <label for="actor.system.personality.content" class="resource-label">{{localize actor.system.personality.label}}:</label>
    {{#if editable }}
    <prose-mirror name="system.personality.content" button="true" editable={{editable}} value="{{ system.personality.content }}" toggled="false">{{{ personalityHTML }}}</prose-mirror>
    {{/if}}
    <label for="actor.system.description.content" class="resource-label">{{localize actor.system.description.label}}:</label>
    {{#if editable }}
    <prose-mirror name="system.description.content" button="true" editable={{editable}} value="{{ system.description.content }}" toggled="false">{{{ descriptionHTML }}}</prose-mirror>
    {{/if}}
    <label for="system.background.content" class="resource-label">{{localize system.background.label}}:</label>
    {{#if editable }}
    <prose-mirror name="system.background.content" button="true" editable={{editable}} value="{{ system.background.content }}" toggled="false">{{{ backgroundHTML }}}</prose-mirror>
    {{/if}}
</div>
