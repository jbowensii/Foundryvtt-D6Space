<div class="tab description" data-group="primary" data-tab="description">
    {{#if (eq actor.system.description.label)}}
        <label for="actor.system.description.content" class="resource-label">{{localize actor.system.description.label}}:</label>
    {{else}}
        <label for="actor.system.description.content" class="resource-label">{{localize 'OD6S.DESCRIPTION'}}:</label>
    {{/if}}
    {{#if editable}}
      <prose-mirror name="system.description.content" value="{{actor.system.description.content}}" toggled="true"></prose-mirror>
    {{else}}
      <div class="editor-content">{{{actor.system.description.content}}}</div>
    {{/if}}
</div>
