<div class="settings-wrapper">
    <section class="scrollable">
    {{#each settings as |setting s|}}
        <div class="form-group">
            <label for="{{setting.key}}">{{localize setting.name}}</label>
            <div class="form-fields">
                {{#if setting.choice}}
                    <select name="{{setting.key}}" id="{{setting.key}}">
                        {{#each setting.choices as |label key|}}
                        <option value="{{key}}" {{#if (eq key ../setting.value)}}selected{{/if}}>{{localize label}}</option>
                    {{/each}}
                    </select>
                {{else}}
                    {{#if (eq setting.filePicker "image")}}
                        <input type="{{setting.inputType}}" name="{{setting.key}}" data-dtype="{{setting.type.name}}"
                               value="{{setting.value}}">
                        <button type="button" class="file-picker" data-type="image" data-target="{{setting.key}}" tabindex="-1" title="Browse Files">
                            <i class="fas fa-file-import fa-fw"></i>
                        </button>
                    {{else}}
                        <input type="{{setting.inputType}}" name="{{setting.key}}" data-dtype="{{setting.type.name}}"
                               value="{{setting.value}}" {{checked setting.value}} data-field="{{setting.type.name}}">
                    {{/if}}
                {{/if}}
            </div>
        </div>
    {{/each}}
    </section>
    <div class="submit">
        <button type="button" data-action="submit">{{localize "Submit"}}</button>
    </div>
</div>
