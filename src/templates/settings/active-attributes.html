<section class="standard-form">
    {{#each settings as |setting s|}}
        <div class="form-group">
            <label for="{{setting.key}}">{{localize setting.name}}</label>
            <div class="form-fields">
                {{#if setting.choice}}
                    <select name="{{setting.key}}" id="{{setting.key}}">
                            {{#each setting.choices as |choice key|}}
                                <option value="{{key}}" {{#if (eq key ../setting.value)}}selected{{/if}}>
                                    {{localize choice}}
                                </option>
                            {{/each}}
                    </select>
                {{else}}
                    {{#if (eq setting.filePicker "image")}}
                        <input type="{{setting.inputType}}" name="{{setting.key}}" data-dtype="{{setting.type.name}}"
                               value="{{setting.value}}">
                        {{filePicker target=setting.key type="image"}}
                    {{else}}
                        <input type="{{setting.inputType}}" name="{{setting.key}}" data-dtype="{{setting.type.name}}"
                               value="{{setting.value}}" {{checked setting.value}} data-field="{{setting.type.name}}">
                    {{/if}}
                {{/if}}
            </div>
        </div>
    {{/each}}
</section>
