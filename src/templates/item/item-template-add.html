<form>
    <div>
        <label for="itemname"><b>{{localize 'OD6S.NAME'}}</b>:</label>
        <select name="itemname" id="itemname">
            {{#each templateItems as |item key|}}
                <option value="{{item.name}}" data-description="{{item.system.description}}" {{#if (eq item.name ../itemname)}}selected{{/if}}>{{item.name}}</option>
            {{/each}}
        </select>
    </div>
</form>
